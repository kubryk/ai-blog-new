    - generic [ref=e284]:
      - heading "We ship AI tools. We write about what breaks." [level=1] [ref=e285]
      - generic [ref=e286]:
        - paragraph [ref=e287]: TERMINAL is a working log maintained by a small group of applied engineers building language-model features into production systems. We publish the failure modes, cost models, and architectural patterns that we wish we had found six months earlier.
        - paragraph [ref=e288]: No framework hot-takes. No vendor benchmarks. No promises about AGI. The things that ran in production. The things that didn't. The patches in between.
