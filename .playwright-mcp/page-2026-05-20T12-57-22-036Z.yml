      - heading "Agent evaluations that don't lie to you" [level=1] [ref=e494]
      - paragraph [ref=e495]: Most eval suites measure the wrong thing. Here's a harness that actually predicts production regressions — built on replay, canary tasks, and structured disagreement.
      - generic [ref=e496]:
        - generic [ref=e497]: MO
        - generic [ref=e498]:
          - text: M. Osei
          - generic [ref=e499]: TOOLING DIV
    - generic [ref=e500]: "[ IMAGE // LEAD_FIGURE — 1100 × 360 ]"
    - generic [ref=e501]:
      - paragraph [ref=e502]: "In the last eighteen months, our team has shipped language-model integrations into four production surfaces — a code review tool, a customer-support triage layer, an internal search agent, and a regression-triage assistant used by the platform team. Across all four, the same pattern emerged: the eval suite we trusted at launch turned out to be almost useless within two months of production traffic."
      - paragraph [ref=e503]:
        - text: This essay is an attempt to document what actually works. Not a framework. Not a library. A set of practices, most of them boring, that keep regressions out of
        - code [ref=e504]: main
        - text: when the thing you are testing is a statistical sampler attached to a tool-calling loop.
      - heading "The problem with benchmark suites" [level=2] [ref=e505]
      - paragraph [ref=e506]: Most teams start with a static set of labelled examples — a few hundred cases with known-good outputs — and track accuracy across model versions. This works for about six weeks. Then the failure modes of your users diverge from the failure modes in your eval set, and every metric you track is green while support tickets pile up.
      - blockquote [ref=e507]: The unit of evaluation is not a prompt. It is a session.
      - paragraph [ref=e508]:
        - text: Once you accept that, a lot of things simplify. You stop measuring
        - code [ref=e509]: answer_correctness
        - text: at the turn level. You start measuring whether the session terminated in a state the user would call "done." The two are not the same metric, and confusing them is why most dashboards lie.
      - heading "Replay, not regression" [level=2] [ref=e510]
      - paragraph [ref=e511]: We maintain a replay corpus of approximately 8,000 anonymised user sessions. Every PR that touches the agent loop, the system prompt, the tool schemas, or the model config must replay a random 500 and produce a disagreement report.
      - generic [ref=e512]: // REPLAY HARNESS $ aitl replay --target main --baseline prod --n 500 → running 500 sessions on two branches in parallel → comparing tool-call sequences, final states, token counts DISAGREEMENTS 47 ( 9.4% ) ├─ tool-call diff 31 ├─ termination 11 └─ final-state 5 REGRESSIONS 3 ( see disagreement-log-0247.json ) NEUTRAL 38 IMPROVEMENTS 6
      - paragraph [ref=e513]: "Three fields matter: the tool-call sequence, the termination state, and the user-facing final string. If none of those changed meaningfully, the session is neutral. If any of them changed, a human looks at it. This is tedious. It is also the only thing that has ever caught a real regression before our users did."
      - heading "Canary tasks" [level=2] [ref=e514]
      - list [ref=e515]:
        - listitem [ref=e516]: › Keep a small set (20–40) of hand-crafted tasks that exercise your most fragile tool integrations.
        - listitem [ref=e517]: › Run them on every PR. Fail the build on any regression.
        - listitem [ref=e518]: › Add a new canary every time a user reports a real-world failure.
        - listitem [ref=e519]: › Delete canaries that have never caught anything in six months.
      - paragraph [ref=e520]: Canaries are not a substitute for replay. They are the pager. They catch the twenty failure modes you care most about, fast, on every commit. Replay catches the long tail, slowly, before a release.
      - heading "The part that isn't automated" [level=2] [ref=e521]
      - paragraph [ref=e522]: Once a week, two engineers sit down and read twenty random disagreement reports from the replay corpus. No scoring. No metrics. Just reading. This is the single most valuable ritual we have found for keeping a production agent honest, and it is not something you can buy.
      - paragraph [ref=e523]: → Filed under EVALUATION. Entry LOG-0247. Transmission complete.
